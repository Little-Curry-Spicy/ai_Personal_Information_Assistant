# 在项目根目录执行：docker compose up -d --build
# 事先在 backend/.env 中配置密钥（勿提交到 Git）
services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: '3001'
    expose:
      - '3001'

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_CLERK_ENABLED: ${VITE_CLERK_ENABLED:-}
        # 子路径部署到 /info 时，API 走 /info/ai 与 /info/knowledge
        VITE_API_BASE: ${VITE_API_BASE:-/info}
        # 线上默认挂在 /info/ 子路径；若改为根路径可在环境变量覆盖为 /
        VITE_APP_BASE: ${VITE_APP_BASE:-/info/}
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-3001}:80'
    depends_on:
      - backend
